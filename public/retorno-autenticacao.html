<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      async function trocarCodePorToken() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        if (!code) return;

        const params2 = new URLSearchParams();
        params2.append("code", code);
        const tokenResponse = await fetch("http://localhost:8080/auth/google", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params2,
        });
        console.log("Codigo:", code);
        const tokenData = await tokenResponse.json();
        console.log("Token recebido:", tokenData);
        const decodedToken = decodeJwt(tokenData.id_token);
        console.log("Token decodificado:", decodedToken);

        // Armazena o token localmente
        localStorage.setItem("tokenAppCorporativa", tokenData.id_token);
        //localStorage.setItem("tokenAppCorporativa", code);
        // Redireciona para a página principal
        fetch(
          "http://localhost:8080/usuarios/pegaPorEmail?email=" +
            decodedToken.email,
          {
            method: "GET",
            headers: {
              Authorization: "Bearer " + tokenData.id_token,
            },
          },
        )
          .then((response) => {
            console.log("Resposta da verificação do usuário:", response);
            console.log("Status da resposta:", response.status);
            if (response.status === 404) {
              window.location.href =
                "usuario/formulario.html?email=" + decodedToken.email;
              return null;
            }
            return response.json();
          })
          .then((usuario) => {
            console.log("Dados do usuário:", usuario);
            if (usuario === null) return;
            localStorage.setItem(
              "usuarioAppCorporativa",
              JSON.stringify(usuario),
            );
            window.location.href = "index.html";
          });
      }
      function decodeJwt(token) {
        const payload = token.split(".")[1];
        const decoded = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
        return JSON.parse(decoded);
      }
      trocarCodePorToken();
    </script>
  </head>
  <body></body>
</html>
